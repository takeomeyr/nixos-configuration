add_newline = false
command_timeout = 500

format = """
$time $os $username\
$directory\
$git_branch$git_status
"""

[os]
disabled = false
format = "$symbol "

[os.symbols]
NixOS = "ÔĆď"

[username]
show_always = true
format = "$user "

[directory]
format = "‚Äļ $path$read_only "
truncation_length = 3
truncation_symbol = "‚Ä¶/"
home_symbol = "~"
read_only = " ůįćĀ"

[git_branch]
symbol = "ůįäĘ"
format = " $symbol $branch"

[git_status]
format = " $all_status$ahead_behind"

[time]
disabled = false
use_12hr = true
format = "$time"
