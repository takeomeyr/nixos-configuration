# SHELL / SYSTEM:
shell                       /home/alex/.nix-profile/bin/zsh
linux_display_server        wayland
confirm_os_window_close     0
update_check_interval       0
shell_integration           enabled no-cursor


# PERFORMANCE:
sync_to_monitor             yes
repaint_delay               8
input_delay                 2
resize_in_steps             no


# FONT:
font_family                 JetBrainsMono Nerd Font
bold_font                   auto
italic_font                 auto
bold_italic_font            auto
font_size                   11.6
disable_ligatures           never
adjust_line_height          2
adjust_column_width         0


# CURSOR:
cursor_shape                beam
cursor_blink_interval       0
cursor                      #88C0D0
cursor_text_color           #2E3440


# MOUSE:
copy_on_select              yes
strip_trailing_spaces       always


# WINDOW:
window_title_format         {cwd}
window_border_width         1.5pt
window_padding_width        8
window_margin_width         6
background_opacity          0.96
background_blur             63


# TAB BAR:
tab_bar_edge                bottom
tab_bar_style               powerline
tab_bar_align               left
tab_bar_min_tabs            1
tab_bar_background          #2E3440
tab_bar_margin_width        0.0
tab_bar_margin_height       0.0
tab_title_template          {index}: {title}
active_tab_font_style       bold
inactive_tab_font_style     normal


# TAB COLORS:
active_tab_background       #88C0D0
active_tab_foreground       #2E3440
inactive_tab_background     #434C5E
inactive_tab_foreground     #D8DEE9


# WINDOW BORDERS:
active_border_color         #88C0D0
inactive_border_color       #3B4252
bell_border_color           #BF616A


# BASE COLORS:
background                  #2E3440
foreground                  #D8DEE9
selection_background        #434C5E
selection_foreground        #ECEFF4
url_color                   #88C0D0


# ANSI COLORS:
# Black
color0                      #3B4252
color8                      #4C566A
# Red
color1                      #BF616A
color9                      #D08770
# Green
color2                      #A3BE8C
color10                     #B5CEA8
# Yellow
color3                      #EBCB8B
color11                     #EFD49F
# Blue
color4                      #81A1C1
color12                     #88C0D0
# Magenta
color5                      #B48EAD
color13                     #C895BF
# Cyan
color6                      #88C0D0
color14                     #8FBCBB
# White
color7                      #D8DEE9
color15                     #ECEFF4


# FONT SIZE SHORTCUTS:
map ctrl+shift+> increase_font_size
map ctrl+shift+< decrease_font_size
map ctrl+shift+0 reset_font_size


# CLIPBOARD:
map ctrl+c copy_to_clipboard
map ctrl+v paste_from_clipboard
map ctrl+insert copy_to_clipboard
map shift+insert paste_from_clipboard


# TABS:
map ctrl+shift+t new_tab
map ctrl+shift+w close_tab
map ctrl+tab next_tab
map ctrl+shift+tab previous_tab
map ctrl+shift+right next_tab
map ctrl+shift+left previous_tab
map ctrl+1 goto_tab 1
map ctrl+2 goto_tab 2
map ctrl+3 goto_tab 3
map ctrl+4 goto_tab 4
map ctrl+5 goto_tab 5
map ctrl+6 goto_tab 6
map ctrl+7 goto_tab 7
map ctrl+8 goto_tab 8
map ctrl+9 goto_tab 9


# WINDOWS / SPLITS:
map ctrl+shift+enter new_window
map ctrl+left_button move_window
map ctrl+shift+d launch --location=vsplit
map ctrl+shift+s launch --location=hsplit


# UTILITIES:
map ctrl+shift+k clear_terminal reset active
